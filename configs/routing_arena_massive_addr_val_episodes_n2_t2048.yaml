# massive_addr_val N=2 — placement episode training @ T=2048
#
# Training: same needles + query for 3 consecutive batches; only scatter changes.
# Scatter curriculum: chars 0-200 -> 0-800 -> full haystack.
# Holdout: 300 procedural samples (holdout_seed), no episode repetition.

routing_arena:
  description: "massive_addr_val N=2 placement episodes @ T=2048 — dense_flash 50k"
  train_context_length: 2048
  suite_profile: full
  n_layers: 6

  variants:
    - dense_flash

  dense_finetune_on_task: true
  dense_gate_min: 0

  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10

  dense_checkpoint: null

  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [2048]
    task_types: [massive_addr_val]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: true
    scatter_placement_min: 0
    scatter_placement_max: 200
    num_distractors: 0
    num_kv_pairs: 2
    placement_episode_batches: 3
    synthetic_hop_count: 1
    synthetic_hop_count_min: 1
    synthetic_hop_count_max: 1
    synthetic_decoy_addrs: 0
    synthetic_fake_ptrs: 0
    training_protocol: two_stage
    needle_scatter_curriculum:
      - until_step: 15000
        scatter_placement_min: 0
        scatter_placement_max: 200
      - until_step: 30000
        scatter_placement_min: 0
        scatter_placement_max: 800
      - until_step: 50000
        scatter_placement_min: 0
        scatter_placement_max: null

  transformer:
    sparse_finetune_steps: 50000
    validate_every: 2500
    validate_every_min: 2500
    log_every: 500
    lr: 3.0e-4

  routing_attention:
    fair_finetune: true

  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: true
    eval_use_full_holdout: false

  dry_run:
    sparse_finetune_steps: 80
    validate_every: 20
    log_every: 10
    mid_train_samples_per_cell: 4
