# addr_val 4 scattered decoys @ T=1024 — bridge between T=512 gap cal and T=2048.
# Dense screen 20k, then head-to-head dense vs linear vs local_window64 @ 40k.

routing_arena:
  description: "addr_val 4 decoys scatter @ T=1024 — 4L calibration bridge"
  train_context_length: 1024
  suite_profile: full
  n_layers: 4

  variants:
    - dense_flash
    - linear
    - local_window64

  dense_finetune_on_task: true
  dense_train_from_scratch: true
  dense_gate_min: 0

  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10

  dense_checkpoint: null

  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [1024]
    task_types: [addr_val]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: true
    num_distractors: 4
    synthetic_decoy_addrs: 4
    answer_digit_width: 2
    synthetic_conflict_rows: 3
    synthetic_hop_count: 1
    synthetic_hop_count_min: 1
    synthetic_hop_count_max: 1
    answer_loss_weight: 8.0
    benchmark_variant: gap_decoys_scatter_t1024_4decoys_4L
    training_protocol: two_stage

  transformer:
    sparse_finetune_steps: 40000
    validate_every: 4000
    validate_every_min: 4000
    log_every: 500
    lr: 3.0e-4

  routing_attention:
    fair_finetune: true

  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: true
    eval_use_full_holdout: false

  dry_run:
    sparse_finetune_steps: 80
    validate_every: 20
    log_every: 10
    mid_train_samples_per_cell: 4
