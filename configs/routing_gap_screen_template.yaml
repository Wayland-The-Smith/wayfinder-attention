# Gap calibration screening template @ T=512 — addr_val, from scratch, dense vs linear.
# Patched at runtime by scripts/run_gap_calibration.py

routing_arena:
  description: "gap calibration screen @ T=512"
  train_context_length: 512
  suite_profile: full
  n_layers: 2

  variants:
    - dense_flash
    - linear

  dense_finetune_on_task: true
  dense_train_from_scratch: true
  dense_gate_min: 0

  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10

  dense_checkpoint: null

  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [512]
    task_types: [addr_val]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: false
    num_distractors: 0
    synthetic_decoy_addrs: 0
    answer_digit_width: 1
    synthetic_conflict_rows: 3
    synthetic_hop_count: 1
    synthetic_hop_count_min: 1
    synthetic_hop_count_max: 1
    training_protocol: two_stage

  transformer:
    sparse_finetune_steps: 10000
    validate_every: 1000
    validate_every_min: 1000
    log_every: 500
    lr: 3.0e-4

  routing_attention:
    fair_finetune: true

  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: true
    eval_use_full_holdout: false
