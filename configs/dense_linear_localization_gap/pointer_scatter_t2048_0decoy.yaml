# PRIMARY — pointer_unique depth-NIAH @ T=2048, 0 decoys (dense vs linear).
#
# With 0 decoys there is one KEY VAL row; generator places it at variable depth
# in synthetic noise (classic NIAH — same family as feasibility ladder 95% @ T=2048).
# scatter_multi_needles is set true for protocol consistency but does not multi-scatter
# a single segment (see verify script).
#
# Success (pre-registered):
#   dense official acc >= 60%, (dense - linear) >= 10 pp, dense wins >= 3/5 depth buckets.
routing_arena:
  description: "pointer_unique depth-NIAH T=2048 0-decoy 6L 40k — dense vs linear PRIMARY"
  train_context_length: 2048
  suite_profile: full
  n_layers: 6
  variants: [dense_flash, linear]
  dense_finetune_on_task: true
  dense_train_from_scratch: true
  dense_gate_min: 0
  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10
  dense_checkpoint: null
  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [2048]
    task_types: [pointer_unique]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: true
    num_distractors: 0
    synthetic_decoy_keys: 0
    answer_digit_width: 1
    answer_loss_weight: 8.0
    train_label_mode: answer_only
    include_answer_in_suffix: true
    generation_max_attempts: 128
    benchmark_variant: pointer_scatter_t2048_0decoy
    synthetic_hop_count: 1
    synthetic_hop_count_min: 1
    synthetic_hop_count_max: 1
    training_protocol: two_stage
  transformer:
    sparse_finetune_steps: 40000
    validate_every: 4000
    validate_every_min: 4000
    log_every: 500
    lr: 3.0e-4
  routing_attention:
    fair_finetune: true
  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: false
    eval_use_full_holdout: true
  dry_run:
    sparse_finetune_steps: 80
    validate_every: 20
    log_every: 10
    mid_train_samples_per_cell: 4
