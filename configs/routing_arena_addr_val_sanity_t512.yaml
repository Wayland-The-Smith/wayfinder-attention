# addr_val sanity ladder (Benchmark A) @ T=512
#
# Single ADDR→VAL binding, 1-digit answer (1 supervised token), 0 decoys,
# non-scattered classic NIAH layout, train dense from scratch.

routing_arena:
  description: "addr_val sanity @ T=512 — 1-digit, 0 decoys, non-scattered, from-scratch dense 15k"
  train_context_length: 512
  suite_profile: full
  n_layers: 6

  variants:
    - dense_flash

  dense_finetune_on_task: true
  dense_train_from_scratch: true
  dense_gate_min: 0

  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10

  dense_checkpoint: null

  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [512]
    task_types: [addr_val]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: false
    num_distractors: 0
    synthetic_decoy_addrs: 0
    answer_digit_width: 1
    synthetic_hop_count: 1
    synthetic_hop_count_min: 1
    synthetic_hop_count_max: 1
    training_protocol: two_stage

  transformer:
    sparse_finetune_steps: 15000
    validate_every: 1500
    validate_every_min: 1500
    log_every: 300
    lr: 3.0e-4

  routing_attention:
    fair_finetune: true

  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: true
    eval_use_full_holdout: false

  dry_run:
    sparse_finetune_steps: 80
    validate_every: 20
    log_every: 10
    mid_train_samples_per_cell: 4
