# MQAR addr_val — scattered bindings + multi-query suffix @ T=2048.
#
# Dry-run:  python run_niah_gap_calibration_suite.py --experiment mqar_scatter --dry-run
# Full run: python run_niah_gap_calibration_suite.py --experiment mqar_scatter

routing_arena:
  description: "mqar_addr_val N=16 scatter Q=8 @ T=2048 — dense vs linear (4L)"
  train_context_length: 2048
  suite_profile: full
  n_layers: 4

  variants:
    - dense_flash
    - linear

  dense_finetune_on_task: true
  dense_train_from_scratch: true
  dense_gate_min: 0

  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10

  dense_checkpoint: null

  model:
    output_head: lm_token

  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [2048]
    task_types: [mqar_addr_val]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: true
    num_distractors: 0
    num_kv_pairs: 16
    num_queries: 8
    answer_digit_width: 1
    include_answer_in_suffix: false
    train_label_mode: query_only_answer
    benchmark_variant: mqar_scatter_n16_q8_t2048
    training_protocol: two_stage

  transformer:
    sparse_finetune_steps: 40000
    validate_every: 4000
    validate_every_min: 4000
    log_every: 500
    lr: 3.0e-4

  routing_attention:
    fair_finetune: true

  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: true
    eval_use_full_holdout: false

  dry_run:
    sparse_finetune_steps: 80
    validate_every: 20
    log_every: 10
    mid_train_samples_per_cell: 4
