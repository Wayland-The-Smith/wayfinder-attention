# pointer_active (L1) @ T=2048 — hop-first scattered protocol, query at end.
#
# Needles scattered at random positions (not one clump). Fixed 8 distractors.
# Query always appended at sequence end.

routing_arena:
  description: "pointer_active L1 scattered @ T=2048 at_end, 8 distractors"
  train_context_length: 2048
  suite_profile: full
  n_layers: 6

  variants:
    - dense_flash
    - linear

  dense_finetune_on_task: true
  dense_gate_min: 0

  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10

  dense_checkpoint: null

  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [2048]
    task_types: [pointer_active]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: true
    scatter_placement_min: 0
    scatter_placement_max: null
    num_distractors: 8
    synthetic_hop_count: 1
    synthetic_decoy_keys: 0
    training_protocol: two_stage
    needle_scatter_curriculum:
      - until_step: 1500
        scatter_placement_min: 400
        scatter_placement_max: 900
      - until_step: 5000
        scatter_placement_min: 0
        scatter_placement_max: null
  transformer:
    sparse_finetune_steps: 5000
    validate_every: 500
    validate_every_min: 500
    log_every: 100
    lr: 3.0e-4

  routing_attention:
    fair_finetune: true

  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: true
    eval_use_full_holdout: false

  dry_run:
    sparse_finetune_steps: 40
    validate_every: 10
    log_every: 10
    mid_train_samples_per_cell: 4
