# RUN 1 — Diagnostic: 6L classic NIAH @ T=2048 (match feasibility ladder + linear head-to-head).
#
# Key fixes vs failed localization run:
#   scatter_multi_needles: false, restore_best_checkpoint: true
#
# Success: dense official acc >= 90% (prerequisite for mechanism gap claims).
routing_arena:
  description: "RUN1 diagnostic — pointer_unique classic NIAH T=2048 6L dense vs linear"
  train_context_length: 2048
  suite_profile: full
  n_layers: 6
  variants: [dense_flash, linear]
  dense_finetune_on_task: true
  dense_train_from_scratch: true
  dense_gate_min: 0
  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10
  dense_checkpoint: null
  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [2048]
    task_types: [pointer_unique]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: false
    synthetic_decoy_keys: 0
    num_distractors: 0
    answer_digit_width: 1
    answer_loss_weight: 8.0
    train_label_mode: answer_only
    include_answer_in_suffix: true
    generation_max_attempts: 128
    benchmark_variant: niah_diagnostic_t2048
    synthetic_hop_count: 1
    synthetic_hop_count_min: 1
    synthetic_hop_count_max: 1
    training_protocol: two_stage
  transformer:
    sparse_finetune_steps: 40000
    validate_every: 4000
    validate_every_min: 4000
    log_every: 500
    lr: 3.0e-4
  routing_attention:
    fair_finetune: true
  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: true
    eval_use_full_holdout: true
  dry_run:
    sparse_finetune_steps: 80
    validate_every: 20
    log_every: 10
    mid_train_samples_per_cell: 4
