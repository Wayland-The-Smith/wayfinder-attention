# RUN 3 — MQAR N=4 bindings, Q=4 queries, all-query answer supervision @ T=2048 scatter.
#
# Pre-registered success:
#   dense >= 60%, (dense - linear) >= 10 pp
routing_arena:
  description: "RUN3 mqar_addr_val N=4 Q=4 all-answer supervise scatter T=2048 6L dense vs linear"
  train_context_length: 2048
  suite_profile: full
  n_layers: 6
  variants: [dense_flash, linear]
  dense_finetune_on_task: true
  dense_train_from_scratch: true
  dense_gate_min: 0
  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10
  dense_checkpoint: null
  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [2048]
    task_types: [mqar_addr_val]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: true
    num_distractors: 0
    num_kv_pairs: 4
    num_queries: 4
    mqar_supervise_all_queries: true
    answer_digit_width: 1
    answer_loss_weight: 8.0
    generation_max_attempts: 128
    benchmark_variant: mqar_n4_q4_t2048
    training_protocol: two_stage
  transformer:
    sparse_finetune_steps: 40000
    validate_every: 4000
    validate_every_min: 4000
    log_every: 500
    lr: 3.0e-4
  routing_attention:
    fair_finetune: true
  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: true
    eval_use_full_holdout: true
  dry_run:
    sparse_finetune_steps: 80
    validate_every: 20
    log_every: 10
    mid_train_samples_per_cell: 4
