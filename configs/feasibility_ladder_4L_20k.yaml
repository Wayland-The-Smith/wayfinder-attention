# 4L classic NIAH @ T=2048 — 20k steps (no early stop) to probe 90%+ gate.
# Run: python run_feasibility_ladder_suite.py --config configs/feasibility_ladder_4L_20k.yaml --levels 2 --no-stop-on-failure --output-dir experiments/Experiment_7/feasibility_ladder_4L_20k

feasibility_ladder:
  description: "4L classic NIAH @ T=2048, 20k steps"
  suite_profile: fast
  stop_on_failure: false
  synthetic: true
  seed: 45
  training:
    cudnn_deterministic: true
    cudnn_benchmark: false

  dry_run:
    max_steps: 50
    validate_every: 10
    log_every: 10
    eval_samples_per_cell: 1
    mid_train_samples_per_cell: 1
    data:
      batch_size: 1

  levels:
    - level: 2
      name: classic_niah_4L_20k
      description: "4L dense baseline: T=2048, classic NIAH, 20k steps"
      train_context_length: 2048
      save_checkpoint: true
      model:
        n_layers: 4
      pass_criteria:
        primary_gate_accuracy_min: 0.90
      long_context_benchmark:
        context_lengths: [2048]
        task_types: [pointer_unique]
        needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
        suffix_placement: at_end
        scatter_multi_needles: false
        synthetic_decoy_keys: 0
        synthetic_hop_count: 1
        synthetic_hop_count_min: 1
        synthetic_hop_count_max: 1
        eval_samples_per_cell: 4
        generation_max_attempts: 16
      transformer:
        max_steps: 20000
        dense_pretrain_steps: 20000
        validate_every: 500
        validate_every_min: 500
        log_every: 200
        lr: 3.0e-4
        lr_warmup_steps: 500
      dense_calibration:
        live_metrics: true
        early_stop: false
        eval_use_full_holdout: true
        restore_best_checkpoint: true
        mid_train_samples_per_cell: 4
        target_accuracy: 0.90

