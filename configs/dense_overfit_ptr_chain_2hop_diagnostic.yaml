# Dense overfit diagnostic — 2-hop ptr_chain (ADDR PTR ADDR VAL).
#
# Same as 1-hop diagnostic except hop_count=2.
#
# Run:
#   python scripts/run_dense_overfit_diagnostic.py --config configs/dense_overfit_ptr_chain_2hop_diagnostic.yaml --output-dir experiments/Experiment_7/dense_overfit_ptr_chain_2hop_diagnostic

dense_overfit_diagnostic:
  description: "ptr_chain 2-hop overfit sanity — 32 samples @ T=1024"
  suite_profile: full
  synthetic: true

  holdout:
    total_samples: 32
    mid_train_samples_per_cell: 32

  dry_run:
    max_steps: 80
    validate_every: 10
    log_every: 10
    mid_train_samples_per_cell: 32

  level:
    level: 0
    name: ptr_chain_overfit_32_2hop
    description: "ptr_chain hop=2, 0 distractors, scatter 0–200, overfit 32 @ T=1024"
    train_context_length: 1024
    save_checkpoint: false
    pass_criteria:
      primary_gate_accuracy_min: 0.95
    long_context_benchmark:
      benchmark_family: synthetic
      context_lengths: [1024]
      task_types: [ptr_chain]
      needle_depths: [0.50]
      haystack_modes: [synthetic_noise]
      suffix_placement: at_end
      scatter_multi_needles: true
      scatter_placement_min: 0
      scatter_placement_max: 200
      synthetic_hop_count: 2
      synthetic_hop_count_min: 2
      synthetic_hop_count_max: 2
      num_distractors: 0
      synthetic_decoy_addrs: 0
      synthetic_fake_ptrs: 0
      min_haystack_side_chars: 8
      overfit_train_samples: 32
      overfit_eval_same_samples: true
      eval_samples_per_cell: 32
      train_task_sampling: balanced
    transformer:
      max_steps: 1500
      dense_pretrain_steps: 1500
      validate_every: 25
      validate_every_min: 25
      log_every: 50
    dense_calibration:
      live_metrics: true
      early_stop: false
      restore_best_checkpoint: true
      mid_train_samples_per_cell: 32
      target_accuracy: 0.95
