# passkey_copy @ T=4096 — scattered 5-digit passkey, 6L dense probe (linear optional).
#
# Training stream uses seed=42; holdout grid uses holdout_seed (disjoint, never in training).
# Full run: official 300-sample holdout eval on final checkpoint weights.
#
# Dry-run:  python run_passkey_copy_suite.py --dry-run
# Full run: python run_passkey_copy_suite.py
# Linear:    python run_passkey_copy_suite.py --variants linear

routing_arena:
  description: "passkey_copy scatter @ T=4096 6L 40k — dense vs linear (final ckpt)"
  train_context_length: 4096
  suite_profile: full
  n_layers: 6

  variants:
    - dense_flash
    - linear

  dense_finetune_on_task: true
  dense_train_from_scratch: true
  dense_gate_min: 0

  holdout:
    total_samples: 300
    mid_train_samples_per_cell: 10

  dense_checkpoint: null

  long_context_benchmark:
    benchmark_family: synthetic
    context_lengths: [4096]
    task_types: [passkey_copy]
    needle_depths: [0.10, 0.25, 0.50, 0.75, 0.90]
    suffix_placement: at_end
    scatter_multi_needles: true
    num_distractors: 0
    answer_digit_width: 5
    answer_loss_weight: 8.0
    train_label_mode: answer_only
    include_answer_in_suffix: true
    benchmark_variant: passkey_copy_t4096_6L_40k
    synthetic_hop_count: 1
    synthetic_hop_count_min: 1
    synthetic_hop_count_max: 1
    training_protocol: two_stage

  transformer:
    sparse_finetune_steps: 40000
    validate_every: 4000
    validate_every_min: 4000
    log_every: 500
    lr: 3.0e-4

  routing_attention:
    fair_finetune: true

  dense_calibration:
    live_metrics: true
    early_stop: false
    restore_best_checkpoint: false
    eval_use_full_holdout: true

  dry_run:
    sparse_finetune_steps: 80
    validate_every: 20
    log_every: 10
    mid_train_samples_per_cell: 4
